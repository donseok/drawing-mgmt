# R51 — Nginx reverse-proxy config for drawing-mgmt production.
#
# Mounted into the `nginx` service from docker-compose.prod.yml at:
#   /etc/nginx/conf.d/default.conf  (read-only)
#
# Responsibilities
#   - Terminate TLS (1.2/1.3) on :443 and force-redirect :80 → :443.
#   - Reverse-proxy upstream `web:3000` (compose service DNS, internal only).
#   - Preserve client info via X-Forwarded-* headers.
#   - Pass through WebSocket / SSE upgrades (Connection / Upgrade).
#   - Allow up to 256MB request bodies (R49 / FIND-011 caps attachments at
#     200MB; this gives room for chunked-upload headers + tiny overhead).
#   - Re-emit HSTS at the edge (the Next.js layer already sets it in prod,
#     but having Nginx send the same header guards the proxy hop).
#
# Application-layer security headers (CSP, X-Frame-Options, Referrer-Policy,
# Permissions-Policy, X-Content-Type-Options) are emitted by
# apps/web/middleware.ts on every response. We do not duplicate them here
# to avoid drift — the app stays the single source of truth.
#
# TLS certificates (cert + key) are mounted at /etc/nginx/certs as:
#   server.crt  (PEM cert chain)
#   server.key  (PEM private key)
# Both files are .gitignored. Issue via Let's Encrypt (`certbot certonly`)
# or your internal CA, then drop the PEMs into ops/nginx/certs/ on the host.

# ── WebSocket / SSE Connection upgrade map ────────────────────────────────
# Used by `proxy_set_header Connection $connection_upgrade;` below. Must be
# at http{} scope; /etc/nginx/conf.d/*.conf is included inside http{} so
# this is fine.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstream — Next.js app inside the compose network ─────────────────────
upstream web_upstream {
    server web:3000;
    keepalive 32;
}

# ── HTTP — redirect everything to HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME http-01 challenge path (in case certbot is run with the webroot
    # plugin against a mounted volume). Drop a `.well-known/acme-challenge/*`
    # tree into ops/nginx/certs/ to use this — otherwise it 404s harmlessly.
    location /.well-known/acme-challenge/ {
        root /etc/nginx/certs;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — TLS termination + reverse proxy to Next.js ────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # TLS — keys live on the host bind-mount.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # OWASP-recommended baseline (Mozilla "intermediate" 2024).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — same value the app emits in prod (1y, includeSubDomains, no
    # preload). Setting it here as well covers the edge hop directly.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload cap — R49 / FIND-011 ceiling is 200MB; pad slightly for headers.
    client_max_body_size 256m;
    client_body_timeout 300s;
    proxy_request_buffering off;

    # gzip — text + JSON only, leave already-compressed payloads alone.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # Nginx-level health endpoint — used by the compose healthcheck, no
    # round-trip to web. The app's full /api/v1/health is reachable normally
    # at https://<host>/api/v1/health for external monitors.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Main reverse proxy block.
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;

        # Forward client info — Next.js / Auth.js read these to build absolute
        # URLs, set secure-cookie flags, and rate-limit by real IP.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket / SSE upgrade — required for Server-Sent Events
        # notification streams and any future WS endpoints.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Long-lived streams (SSE, chunked uploads). Keep timeouts generous
        # so big PDFs / DWGs don't get cut mid-flight.
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Don't buffer responses we want to stream (SSE).
        proxy_buffering off;
    }
}

