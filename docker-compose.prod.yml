# R51 — drawing-mgmt 운영(production) docker-compose
#
# 사용:
#   1) `.env.production`을 이 파일과 같은 디렉토리에 둔다 (예: DATABASE_URL,
#      AUTH_SECRET, REDIS_URL, FILE_STORAGE_ROOT, NEXT_PUBLIC_BASE_URL,
#      ODA_CONVERTER_PATH, LIBREDWG_DWG2DXF_PATH, GS_PATH 등).
#      운영에서는 NEXT_PUBLIC_BASE_URL을 `https://...`로 둘 것 (R51).
#   2) TLS 인증서를 ops/nginx/certs/server.{crt,key} 로 둔다.
#      - Let's Encrypt: `certbot certonly --webroot -w ops/nginx/certs -d <fqdn>`
#        후 fullchain.pem → server.crt, privkey.pem → server.key 심볼릭 또는 복사.
#      - 사내 CA: 기관 root로 서명 후 PEM을 같은 위치에 둠.
#      - 자체서명(dev 전용): 가이드는 ops/nginx/.gitignore 참조.
#   3) `docker compose -f docker-compose.prod.yml up -d` 로 기동.
#   4) web/worker 이미지는 viewer-engineer가 작성한 apps/web/Dockerfile,
#      apps/worker/Dockerfile 로 빌드된다.
#
# 라이선스 메모:
#   - LibreDWG(GPL)는 worker 이미지 안에서 dwg2dxf subprocess로만 호출.
#     web 이미지에는 포함되지 않는다 (라이선스 격리 유지).
#   - ODA File Converter binary는 라이선스가 사용자 환경에 의존하므로
#     기본은 호스트에서 마운트하는 형태로 둔다 (worker Dockerfile에서 옵션
#     COPY 가능). 본 compose에서는 환경변수로 path만 받는다.
#
# 네트워크 (R51):
#   - 외부 노출은 nginx(80, 443)만.
#   - web(3000), postgres, redis는 내부 default bridge 네트워크에서만 접근.
#   - nginx → web은 compose service DNS(`web:3000`)로 reverse proxy.

services:
  postgres:
    image: postgres:16-alpine
    container_name: drawmgmt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-drawmgmt}
      POSTGRES_USER: ${POSTGRES_USER:-drawmgmt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawmgmt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-drawmgmt} -d ${POSTGRES_DB:-drawmgmt}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: drawmgmt-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: drawmgmt-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # R51 — 3000 포트는 더 이상 호스트로 publish하지 않는다. nginx가
    # 같은 compose 네트워크에서 `web:3000`으로 직접 reverse proxy 한다.
    expose:
      - "3000"
    volumes:
      - file_storage:/var/lib/drawmgmt/files
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3000/api/v1/health > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: drawmgmt-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/drawmgmt/files

  # R51 — Nginx 진입점. TLS termination + HTTP→HTTPS 강제 + reverse proxy.
  # 외부에서 80/443으로만 접근 가능. 보안 헤더(CSP/X-Frame-Options 등)는
  # 앱 layer가 미들웨어에서 emit하므로 여기서는 HSTS만 edge에서 재설정한다.
  nginx:
    image: nginx:1.27-alpine
    container_name: drawmgmt-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: drawmgmt_postgres_data
  redis_data:
    name: drawmgmt_redis_data
  file_storage:
    name: drawmgmt_file_storage
