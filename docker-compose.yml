services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: drawmgmt-postgres
    environment:
      POSTGRES_USER: drawmgmt
      POSTGRES_PASSWORD: drawmgmt
      POSTGRES_DB: drawmgmt
    ports:
      - "5432:5432"
    volumes:
      - drawmgmt_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawmgmt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: drawmgmt-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  drawmgmt_db:
